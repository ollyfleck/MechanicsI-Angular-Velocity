screen:
  width: 1000
  height: 1000

cube_size: 4

rotation_angles:
  x: 0
  y: 0
  z: 0

# ==================== PHYSICS CONFIGURATION ====================
physics:
  frame_rate: 60
  start_key: ' '
  fixed_physics_dt: 0.008333333  # Fixed timestep for physics (1/120s) - stable integration

angular_velocity:
  damping: 1.0                  # No friction - momentum is preserved indefinitely until user applies new force
  max_speed: 6              # Maximum angular velocity magnitude (rad/s)

# ==================== VISUAL ROTATION CONFIGURATION ====================
visual_rotation:
  enabled: true                 # Enable visual rotation scaling system
  multiplier: 1              # Direct speed multiplier (0.1=very slow, 2.0=2x fast, etc.)

# ==================== PROJECTION CONFIGURATION ====================
projection:
  camera_distance: 25           # Distance from camera to origin (Z-axis)
  fov: 800                      # Field of view scale factor

# ==================== COLOR CONFIGURATION ====================
colors:
  bg: [10, 15, 30]
  cube_edges: [255, 255, 255]
  velocity: [140, 190, 255]
  highlight: [255, 220, 180]
# ==================== MOUSE INPUT CONFIGURATION ====================
mouse_drag_sensitivity:
  omega_x: 0.1    # Vertical drag → X-axis rotation sensitivity
  omega_y: 0.1    # Horizontal drag → Y-axis rotation sensitivity
  omega_z: 0.06    # Combined drag → Z-axis rotation sensitivity

# WASDEQ key-based rotation sensitivity (flight-simulator style)
keys_omega_sensitivity:
  omega_x: 2   # W/S keys → X-axis rotation speed
  omega_y: 2   # A/D keys → Y-axis rotation speed
  omega_z: 2   # E/Q keys → Z-axis rotation speed

# ==================== VECTOR CONFIGURATION ====================
# Unified vector visualization settings.
# Each vector type has:
#   rendering: "simple" (2D line) or "enhanced" (3D cylinder+cone)
#   scale_factor: display length per unit of physical magnitude (e.g., units per rad/s)
#   min_length:    minimum visible length (must exceed tip_length for visible shaft)
#   clamp_max:     maximum display length to prevent overshoot
#   geometry:      shaft_radius, shaft_segments, tip_length, arrowhead_radius_ratio
#
# Shading applies to all enhanced-mode vectors.

vectors:
  omega:
    enabled: true
    rendering: "enhanced"
    color: [80, 80, 255]
    color_secondary: [255, 100, 100]
    scale_factor: 1
    min_length: 0
    clamp_max: 8
    geometry:
      shaft_radius: 2
      shaft_segments: 16
      tip_length: 2.0
      arrowhead_radius_ratio: 5

  tangential_velocity:
    enabled: true
    rendering: "enhanced"
    color: [140, 190, 255]
    color_secondary: [100, 255, 100]
    scale_factor: 0.1
    min_length: 0
    clamp_max: 8
    geometry:
      shaft_radius: 1
      shaft_segments: 8
      tip_length: 1
      arrowhead_radius_ratio: 5

  centripetal_acceleration:
    enabled: true
    rendering: "enhanced"
    color: [255, 255, 80]
    color_secondary: [255, 100, 80]
    scale_factor: 0.02
    min_length: 0
    clamp_max: 4
    geometry:
      shaft_radius: 1
      shaft_segments: 8
      tip_length: 1
      arrowhead_radius_ratio: 5

  face_normals:
    enabled: true
    rendering: "simple"
    color: [200, 200, 255]
    fixed_length: 3

# Global vector rendering settings
vector_rendering:
  # Enable/disable alpha blending for short vectors (fade-in effect based on length)
  alpha_blending_enabled: true
  # Minimum display length ratio relative to tip_length below which vectors are skipped entirely
  # A value of 0.3 means vectors shorter than 30% of their tip length won't be drawn
  min_draw_ratio: 0.05

# Global shading settings for enhanced-mode vectors
vector_shading:
  enabled: true
  light_direction: [0.5, 0.8, 0.3]
  ambient: 0.5
  diffuse_max: 1.0

# ==================== DISPLAY TOGGLES ====================
# Starting state for vector display toggles (keys O, V, C, N).
# All toggles start OFF by default.
display_toggles:
  show_omega_vector: true
  show_tangential_vectors: true
  show_centripetal_vectors: true
  show_face_normals: true

# ==================== SYNTHETIC TEST MODE CONFIGURATION ====================
synthetic_test:
  enabled: false
  drag_delta_omega_x: 0.1
  drag_delta_omega_y: 0.08

# ==================== VERTEX CONFIGURATION ====================
# Per-vertex vector display starting state.
# Each vertex (0-7) corresponds to a cube corner.
# Keys 1-8 toggle vectors for each vertex in the UI.
vertices:
  vertex_0:
    enabled: true   # Vertex at (-1, -1, -1) relative to cube center
  vertex_1:
    enabled: true   # Vertex at (1, -1, -1) relative to cube center
  vertex_2:
    enabled: true   # Vertex at (1, 1, -1) relative to cube center
  vertex_3:
    enabled: true   # Vertex at (-1, 1, -1) relative to cube center
  vertex_4:
    enabled: true   # Vertex at (-1, -1, 1) relative to cube center
  vertex_5:
    enabled: true   # Vertex at (1, -1, 1) relative to cube center
  vertex_6:
    enabled: true   # Vertex at (1, 1, 1) relative to cube center
  vertex_7:
    enabled: true   # Vertex at (-1, 1, 1) relative to cube center