screen:
  width: 1000
  height: 1000

cube_size: 4

rotation_angles:
  x: 0
  y: 0
  z: 0

# ==================== PHYSICS CONFIGURATION ====================
physics:
  frame_rate: 60
  start_key: ' '
  fixed_physics_dt: 0.008333333  # Fixed timestep for physics (1/120s) - stable integration

angular_velocity:
  damping: 1.0                  # No friction - momentum is preserved indefinitely until user applies new force
  max_speed: 180.0              # Maximum angular velocity magnitude (rad/s)

# ==================== VISUAL ROTATION CONFIGURATION ====================
visual_rotation:
  enabled: true                 # Enable visual rotation scaling system
  multiplier: 0.05              # Direct speed multiplier (0.1=very slow, 2.0=2x fast, etc.)

# ==================== PROJECTION CONFIGURATION ====================
projection:
  camera_distance: 25           # Distance from camera to origin (Z-axis)
  fov: 800                      # Field of view scale factor

# ==================== COLOR CONFIGURATION ====================
colors:
  bg: [10, 15, 30]
  cube_edges: [180, 200, 220]
  omega: [255, 0, 0]
  velocity: [140, 190, 255]
  axis: [120, 160, 200]
  highlight: [255, 220, 180]
  text_main: [230, 240, 255]
  text_sub: [180, 190, 210]

# Edge colors for cube wireframe (RGB values)
edge_colors:
  - [255, 100, 100]   # Red
  - [100, 255, 100]   # Green
  - [100, 100, 255]   # Blue
  - [255, 255, 100]   # Yellow
  - [255, 100, 255]   # Magenta
  - [100, 255, 255]   # Cyan
  - [255, 150, 50]    # Orange
  - [150, 50, 255]    # Purple
  - [255, 200, 200]   # Pink
  - [200, 255, 200]   # Light Green
  - [200, 200, 255]   # Light Blue
  - [255, 255, 255]   # White

# ==================== MOUSE INPUT CONFIGURATION ====================
mouse_drag_sensitivity:
  omega_x: 0.5    # Vertical drag → X-axis rotation sensitivity
  omega_y: 0.4    # Horizontal drag → Y-axis rotation sensitivity
  omega_z: 0.3    # Combined drag → Z-axis rotation sensitivity

# WASDEQ key-based rotation sensitivity (flight-simulator style)
keys_omega_sensitivity:
  omega_x: 40.0   # W/S keys → X-axis rotation speed
  omega_y: 40.0   # A/D keys → Y-axis rotation speed
  omega_z: 30.0   # E/Q keys → Z-axis rotation speed

# ==================== VECTOR CONFIGURATION ====================
# Unified vector visualization settings.
# Each vector type has:
#   rendering: "simple" (2D line) or "enhanced" (3D cylinder+cone)
#   length_at_max: display length when magnitude = max_speed
#   min_length:    minimum visible length (must exceed tip_length for visible shaft)
#   geometry:      shaft_radius, shaft_segments, tip_length, arrowhead_radius_ratio
#
# Shading applies to all enhanced-mode vectors.

vectors:
  omega:
    enabled: true
    rendering: "enhanced"
    length_at_max: 16
    min_length: 1
    geometry:
      shaft_radius: 2
      shaft_segments: 32
      tip_length: 2.0
      arrowhead_radius_ratio: 5

  tangential_velocity:
    enabled: true
    rendering: "enhanced"
    length_at_max: 8
    min_length: 1
    geometry:
      shaft_radius: 1
      shaft_segments: 8
      tip_length: 1.5
      arrowhead_radius_ratio: 5

  centripetal_acceleration:
    enabled: true
    rendering: "enhanced"
    length_at_max: 6
    min_length: 1
    geometry:
      shaft_radius: 1
      shaft_segments: 8
      tip_length: 1.5
      arrowhead_radius_ratio: 5

  face_normals:
    enabled: true
    rendering: "simple"
    fixed_length: 3

# Global shading settings for enhanced-mode vectors
vector_shading:
  enabled: true
  light_direction: [0.5, 0.8, 0.3]
  ambient: 0.5
  diffuse_max: 1.0

# ==================== DISPLAY TOGGLES ====================
show_face_normals: true

# ==================== SYNTHETIC TEST MODE CONFIGURATION ====================
synthetic_test:
  enabled: false
  drag_delta_omega_x: 0.1
  drag_delta_omega_y: 0.08